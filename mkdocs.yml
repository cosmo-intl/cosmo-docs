site_name: Cosmopolitan
site_description: Ergonomic, ICU-backed application localisation for PHP, JavaScript, and Python.
site_url: https://salarmehr.github.io/cosmopolitan-docs/
copyright: MIT © Aiden Adrian

# All three ports live under the salarmehr account. Adjust if the JS/Python repos
# are published under different names.
repo_url: https://github.com/salarmehr/cosmopolitan
repo_name: salarmehr/cosmopolitan
edit_uri: ""

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.tabs.link        # sync language tabs across the whole site
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      # Pygments' PHP lexer only highlights code inside <?php ?>. Our snippets are
      # bare PHP, so treat ```php blocks as already-inline (startinline).
      extend_pygments_lang:
        - name: php
          lang: php
          options:
            startinline: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true      # required for content.tabs.link
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# The playground vendors the cosmopolitan-js sources (under docs/javascripts/);
# its bundled README.md is the library readme, not a docs page, so keep MkDocs
# from treating it as one (it carries links relative to the JS repo).
exclude_docs: |
  javascripts/cosmopolitan/README.md

plugins:
  - search

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Guide:
      - guide/locale-metadata.md
      - guide/numbers-money.md
      - guide/dates-times.md
      - guide/collation-text.md
      - guide/messages-plurals.md
      - guide/lists-ranges-relative.md
  - API reference: api-reference.md
  - Playground: playground.md
  - Feature parity: parity.md
  - Platform notes: platform-notes.md
  - Resources: resources.md

extra_css:
  - stylesheets/playground.css

extra_javascript:
  # playground.js is an ES module (it `import`s the vendored cosmopolitan-js).
  - path: javascripts/playground.js
    type: module
  # Pre-selects a language tab from `?lang=…` on deep links from the READMEs.
  - javascripts/lang-select.js
