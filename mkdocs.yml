site_name: Cosmo
site_description: Ergonomic, ICU-backed application localisation for PHP, JavaScript, Python, Java, and C#.
site_url: https://cosmo.miloun.com/
site_author: Aiden Adrian
copyright: MIT © Aiden Adrian

# Default `mkdocs serve` address. 8000 is heavily contested (Django, python
# http.server, etc.); 8765 is far less likely to already be in use.
dev_addr: 127.0.0.1:8765

# The header source widget links to the cosmo-intl GitHub organisation. Star/fork
# stats are hidden via CSS (.md-source__facts in home.css) because they'd only
# reflect one repo; per-language GitHub links live on the home page instead.
repo_url: https://github.com/cosmo-intl
repo_name: cosmo-intl
edit_uri: ""

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.tabs.link        # sync language tabs across the whole site
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details        # enables collapsible `???`/`???+` admonitions
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      # Pygments' PHP lexer only highlights code inside <?php ?>. Our snippets are
      # bare PHP, so treat ```php blocks as already-inline (startinline).
      extend_pygments_lang:
        - name: php
          lang: php
          options:
            startinline: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true      # required for content.tabs.link
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# The playground vendors the @miloun/cosmo JS sources (under docs/javascripts/
# cosmopolitan/ — folder name kept so the playground import path stays stable);
# its bundled README.md is the library readme, not a docs page, so keep MkDocs
# from treating it as one (it carries links relative to the JS repo).
exclude_docs: |
  javascripts/cosmopolitan/README.md

plugins:
  - search
  # Keep the pre-split URL alive: the old combined page became two guides.
  - redirects:
      redirect_maps:
        guide/numbers-money.md: guide/numbers.md

nav:
  - Home: index.md
  - Introduction: introduction.md
  - Getting started: getting-started.md
  - Locales & time zones: locales.md
  - Guide:
      - guide/terminology.md
      - guide/locale-metadata.md
      - guide/numbers.md
      - guide/money.md
      - guide/dates-times.md
      - guide/collation-text.md
      - guide/messages-plurals.md
      - guide/lists-ranges-relative.md
      - guide/transliteration-parsing.md
      - guide/negotiation-names.md
  - API reference: api-reference.md
  - Playground: playground.md
  - Feature parity: parity.md
  - Platform notes: platform-notes.md
  - Resources: resources.md

extra:
  # Google Analytics 4 (Measurement ID from GA Admin → Data Streams).
  analytics:
    provider: google
    property: G-GGJ7WP7CDV
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cosmo-intl
      name: Cosmo on GitHub

extra_css:
  - stylesheets/home.css
  - stylesheets/playground.css

extra_javascript:
  # playground.js is an ES module (it `import`s the vendored cosmopolitan-js).
  - path: javascripts/playground.js
    type: module
  # Pre-selects a language tab from `?lang=…` on deep links from the READMEs.
  - javascripts/lang-select.js
